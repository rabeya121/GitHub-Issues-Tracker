<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>GitHub Issues Tracker</title>
        <script>
                if (!localStorage.getItem("login")) {
                        window.location.href = "login.html";
                }
        </script>

        <link href="https://cdn.jsdelivr.net/npm/daisyui@latest/dist/full.css" rel="stylesheet">
        <script src="https://cdn.tailwindcss.com"></script>

        <!-- Font Awesome CDN -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
                integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
                crossorigin="anonymous" referrerpolicy="no-referrer" />


</head>

<body class="bg-gray-100">

        <!-- NAVBAR -->

        <div class="navbar bg-white shadow px-10">

                <div class="flex-1 flex items-center gap-3">

                        <img src="./assets/github-logo.png" class="w-8">

                        <h1 class="text-xl font-semibold">
                                GitHub Issues Tracker
                        </h1>

                </div>

                <div class="flex gap-3">

                        <input id="searchInput" type="text" placeholder="Search issues..."
                                class="input input-bordered w-64" onkeyup="searchIssue()" />

                        <button class="btn btn-primary bg-indigo-600">
                                + New Issue
                        </button>

                </div>

        </div>


        <!-- TABS SECTION -->

        <div class="max-w-6xl mx-auto mt-8 bg-white p-5 rounded-lg shadow">

                <div class="flex gap-3">

                        <button id="allTab" class="btn btn-primary"
                                onclick="displayIssues(allIssues);activeTab('allTab')">
                                All
                        </button>

                        <button id="openTab" class="btn" onclick="filterIssues('open');activeTab('openTab')">
                                Open
                        </button>

                        <button id="closedTab" class="btn" onclick="filterIssues('closed');activeTab('closedTab')">
                                Closed
                        </button>

                </div>

        </div>


        <!-- ISSUE INFO -->

        <div class="max-w-6xl mx-auto mt-6 bg-white p-6 rounded-lg shadow">

                <div class="flex justify-between items-center">

                        <div class="flex gap-3 items-center">

                                <div class="bg-purple-100 p-2 rounded-full">

                                        <img src="./assets/Aperture.png" class="w-5">

                                </div>

                                <div>

                                        <h3 class="font-bold">
                                                50 Issues
                                        </h3>

                                        <p class="text-sm text-gray-500">
                                                Track and manage your project issues
                                        </p>

                                </div>

                        </div>

                        <div class="flex gap-4 text-sm">

                                <span class="flex items-center gap-1">

                                        <div class="w-3 h-3 bg-green-500 rounded-full"></div>

                                        Open

                                </span>

                                <span class="flex items-center gap-1">

                                        <div class="w-3 h-3 bg-purple-500 rounded-full"></div>

                                        Closed

                                </span>

                        </div>

                </div>

        </div>
        <div id="loader" class="flex justify-center mt-10">
                <span class="loading loading-spinner loading-lg text-indigo-600"></span>
        </div>

        <div class="max-w-6xl mx-auto mt-6">
                <div id="issueContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">

                </div>
        </div>


        <!-- MODAL -->

        <dialog id="issueModal" class="rounded-xl p-0 w-[520px]">

                <div class="p-6">

                        <!-- TITLE -->
                        <h2 id="modalTitle" class="text-xl font-bold mb-3"></h2>

                        <!-- STATUS + AUTHOR -->

                        <div class="flex items-center gap-2 text-sm text-gray-500 mb-3">

                                <span id="modalStatus" class="px-3 py-1 rounded-full text-xs text-white"></span>

                                <span id="statusDot" class="w-1.5 h-1.5 bg-gray-500 rounded-full"></span>

                                <span id="modalAuthor"></span>

                                <span id="authorDot" class="w-1.5 h-1.5 bg-gray-500 rounded-full"></span>

                                <span id="modalDate"></span>

                        </div>

                        <!-- LABELS -->
                        <div class="flex gap-2 mb-4">
                                <span id="modalLabel" class="flex gap-2 mb-4"></span>
                        </div>

                        <!-- DESCRIPTION -->
                        <p id="modalDescription" class="text-gray-600 text-sm mb-6"></p>

                        <!-- ASSIGNEE + PRIORITY -->
                        <div class="grid grid-cols-2 bg-gray-100 rounded-lg p-4">

                                <div>
                                        <p class="text-xs text-gray-400">Assignee:</p>
                                        <p id="modalAssignee" class="font-semibold"></p>
                                </div>



                                <div class="flex flex-col items-start">

                                        <p class="text-xs text-gray-400 mb-1">Priority:</p>

                                        <span id="modalPriority" class="px-3 py-1 rounded-full text-xs font-semibold">
                                        </span>

                                </div>



                        </div>

                        <!-- BUTTON -->
                        <div class="text-right mt-6">
                                <button onclick="closeModal()"
                                        class="px-5 py-2 bg-indigo-600 text-white rounded-lg border-none outline-none focus:outline-none">
                                        Close
                                </button>
                        </div>

                </div>

        </dialog>
        

        <script src="script.js"></script>

</body>

</html>
