<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>GitHub Issues Tracker</title>

        <link href="https://cdn.jsdelivr.net/npm/daisyui@latest/dist/full.css" rel="stylesheet">
        <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

        <!-- NAVBAR -->

        <div class="navbar bg-white shadow px-10">

                <div class="flex-1 flex items-center gap-3">

                        <img src="./assets/github-logo.png" class="w-8">

                        <h1 class="text-xl font-semibold">
                                GitHub Issues Tracker
                        </h1>

                </div>

                <div class="flex gap-3">

                        <input id="searchInput" type="text" placeholder="Search issues..."
                                class="input input-bordered w-64" />

                        <button class="btn btn-primary">
                                + New Issue
                        </button>

                </div>

        </div>


        <!-- TABS SECTION -->

        <div class="max-w-6xl mx-auto mt-8 bg-white p-5 rounded-lg shadow">

                <div class="flex gap-3">

                        <button id="allTab" class="btn btn-primary">
                                All
                        </button>

                        <button id="openTab" class="btn">
                                Open
                        </button>

                        <button id="closedTab" class="btn">
                                Closed
                        </button>

                </div>

        </div>


        <!-- ISSUE COUNT SECTION -->

        <!-- ISSUE INFO -->

        <div class="max-w-6xl mx-auto mt-6 bg-white p-6 rounded-lg shadow">

                <div class="flex justify-between items-center">

                        <div class="flex gap-3 items-center">

                                <div class="bg-purple-100 p-2 rounded-full">

                                        <img src="./assets/Aperture.png" class="w-5">

                                </div>

                                <div>

                                        <h3 class="font-bold">
                                                50 Issues
                                        </h3>

                                        <p class="text-sm text-gray-500">
                                                Track and manage your project issues
                                        </p>

                                </div>

                        </div>

                        <div class="flex gap-4 text-sm">

                                <span class="flex items-center gap-1">

                                        <div class="w-3 h-3 bg-green-500 rounded-full"></div>

                                        Open

                                </span>

                                <span class="flex items-center gap-1">

                                        <div class="w-3 h-3 bg-purple-500 rounded-full"></div>

                                        Closed

                                </span>

                        </div>

                </div>

        </div>
        
        <div class="max-w-6xl mx-auto mt-6"> <div id="issueContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6"> </div> </div>


        


        <!-- MODAL -->

        <dialog id="issueModal" class="modal">

                <div class="modal-box">

                        <h3 id="modalTitle" class="font-bold text-lg"></h3>

                        <p id="modalDescription"></p>

                        <p id="modalAuthor"></p>

                        <p id="modalPriority"></p>

                        <p id="modalLabel"></p>

                        <p id="modalDate"></p>

                        <div class="modal-action">

                                <form method="dialog">

                                        <button class="btn">Close</button>

                                </form>

                        </div>

                </div>

        </dialog>


        <script src="script.js"></script>

</body>

</html>
