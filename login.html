<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/daisyui@latest/dist/full.css" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer"
        
/>

</head>

<body class="flex items-center justify-center min-h-screen bg-gray-100">

<div class="bg-white p-10 rounded-lg shadow-lg w-96">

<h2 class="text-2xl font-bold text-center mb-2">GitHub Issue Tracker</h2>
<p class="text-center text-gray-500 mb-6">Sign in to continue</p>

<input id="username" type="text" placeholder="Username"
class="input input-bordered w-full mb-3"/>

<input id="password" type="password" placeholder="Password"


class="input input-bordered w-full mb-3"/>


<button onclick="login()" class="btn btn-primary w-full">
Sign In
</button>

<p class="text-center text-sm mt-4 text-gray-400">
Demo: admin / admin123
</p>

</div>

<script src="script.js"></script>

</body>
</html>
